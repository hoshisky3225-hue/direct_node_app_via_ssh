name: Deploy to DirectAdmin via SSH

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEPLOY_PATH: domains/test.hoshisky.com/public_html
  APP_NAME: test-hoshisky-com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Bỏ qua xác thực host để tránh kẹt tiến trình
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Sync Minimal Files (Only index.js & package.json)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '2222' }}
        run: |
          # Sử dụng rsync để đẩy file, loại bỏ toàn bộ các file khác, chỉ giữ lại index.js và package.json
          rsync -avz --delete \
            --include='index.js' \
            --include='package.json' \
            --exclude='*' \
            -e "ssh -p ${SSH_PORT} -i ~/.ssh/deploy_key" \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Start/Restart Node App via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '2222' }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -s << EOF
          set -e
          cd "${DEPLOY_PATH}"

          # Tự động cài đặt thư viện sản xuất (bỏ qua dev)
          npm install --omit=dev

          # Quản lý tiến trình: Kiểm tra nếu có pm2 thì dùng pm2, không thì chạy nền với nohup
          if command -v pm2 >/dev/null 2>&1; then
            pm2 describe "${APP_NAME}" >/dev/null 2>&1 \
              && pm2 restart "${APP_NAME}" \
              || pm2 start index.js --name "${APP_NAME}"
            pm2 save
          else
            # Nếu không có PM2, tắt tiến trình cũ chạy index.js tại thư mục này và bật cái mới
            pkill -f "node index.js" 2>/dev/null || true
            nohup node index.js >> app.log 2>&1 &
          fi
          EOF